name: Publish npm Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_NOHASHDIR: "true"
      VOIGHT_FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/native/parser/.cache/fetchcontent
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.23.0
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Restore native dependency cache
        uses: actions/cache@v4
        with:
          path: |
            native/parser/.cache/fetchcontent
            tools
          key: ${{ runner.os }}-native-deps-${{ hashFiles('native/parser/CMakeLists.txt', 'native/parser/grammar/*.g4', 'tools/antlr-toolchain.env') }}

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-release-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-release-
            ${{ runner.os }}-ccache-

      - name: Install Emscripten SDK
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install latest
          "$RUNNER_TEMP/emsdk/emsdk" activate latest
          echo "$RUNNER_TEMP/emsdk" >> "$GITHUB_PATH"
          echo "$RUNNER_TEMP/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install --yes ccache ninja-build

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('packages/voight/package.json', 'utf8')).version")"
          EXPECTED_TAG="v$PACKAGE_VERSION"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match package version $EXPECTED_TAG" >&2
            exit 1
          fi

      - name: Clean generated build artifacts
        run: |
          rm -rf native/parser/build_wasm
          rm -rf native/parser/dist
          rm -rf native/parser/generated
          rm -rf packages/voight-parser/dist
          rm -rf packages/voight/dist

      - name: Build wasm bundle
        run: pnpm parser:build

      - name: Build package
        run: pnpm --filter @voight8/voight build

      - name: Print ccache stats
        run: ccache --show-stats

      - name: Validate package tarball
        run: |
          TARBALL="$(cd packages/voight && npm pack --json | node -e "const fs = require('node:fs'); const entries = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(entries[0].filename);")"
          TMP_DIR="$(mktemp -d)"
          cd "$TMP_DIR"
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/packages/voight/$TARBALL"
          node --input-type=module <<'EOF'
          import { InMemoryCatalog, compile, createTableSchema } from "@voight8/voight";

          const catalog = new InMemoryCatalog([
            createTableSchema({
              id: "users",
              path: ["users"],
              columns: ["id", "created_at"],
            }),
          ]);

          const result = compile("SELECT id FROM users ORDER BY created_at DESC LIMIT 1", {
            catalog,
          });

          if (!result.ok) {
            console.error(result);
            process.exit(1);
          }
          EOF

      - name: Publish prerelease to npm
        if: github.event.release.prerelease
        working-directory: packages/voight
        run: npm publish --access public --provenance --tag next

      - name: Publish release to npm
        if: ${{ !github.event.release.prerelease }}
        working-directory: packages/voight
        run: npm publish --access public --provenance
